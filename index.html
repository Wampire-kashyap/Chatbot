<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Support Chatbot</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Load FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Login Modal -->
    <div id="login-modal" class="modal">
        <div class="modal-content glass">
            <div class="welcome-icon">👋</div>
            <h2>Welcome!</h2>
            <p>Please enter your TM ID to continue.</p>
            <input type="text" id="tm-id-input" placeholder="e.g. TM12345" autocomplete="off"/>
            <button id="login-btn">Start Chat</button>
            <p id="login-error" class="error-text" style="display: none;">Invalid TM ID. Please try again.</p>
        </div>
    </div>

    <!-- Main Chat Interface -->
    <div id="chat-container" class="glass" style="display: none;">
        <header class="chat-header">
            <div class="header-info">
                <div class="avatar">
                    <i class="fa-solid fa-robot" style="color: var(--primary);"></i>
                </div>
                <div>
                    <h3>Support Assistant</h3>
                    <span class="status"><span class="status-dot"></span> Online</span>
                </div>
            </div>
            <a href="admin.html" class="admin-link"><i class="fa-solid fa-shield-halved"></i> Admin</a>
        </header>

        <div id="chat-messages" class="chat-messages">
            <!-- Messages will be injected here dynamically -->
        </div>
        
        <div id="suggestions-container" class="suggestions-container">
            <!-- Search suggestions injected here -->
        </div>

        <div class="chat-input-area">
            <input type="text" id="message-input" placeholder="Type your question here..." autocomplete="off"/>
            <button id="send-btn" aria-label="Send Message">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <!-- Load external JS -->
    <script src="script.js"></script>
</body>
</html>
